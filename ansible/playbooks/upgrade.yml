---
- import_playbook: snapshot.yml

- name: Upgrade all hosts
  hosts: all
  become: true
  tasks:
    - name: Run apt dist-upgrade
      ansible.builtin.apt:
        upgrade: dist
        update_cache: true

    - name: Check if reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Reboot if required
      ansible.builtin.reboot:
        msg: Rebooting after apt upgrade
        reboot_timeout: 300
      when: reboot_required.stat.exists

- name: Update Pi-hole after upgrade
  hosts: pihole
  become: true
  tasks:
    - name: Run Pi-hole update tasks
      ansible.builtin.import_role:
        name: pihole
        tasks_from: update
