---
- name: Check if pihole is already installed
  ansible.builtin.stat:
    path: /usr/local/bin/pihole
  register: pihole_binary

- name: Create /etc/pihole directory
  ansible.builtin.file:
    path: /etc/pihole
    state: directory
    mode: "0755"
  when: not pihole_binary.stat.exists

- name: Write setupVars.conf
  ansible.builtin.template:
    src: setupVars.conf.j2
    dest: /etc/pihole/setupVars.conf
    mode: "0644"
  when: not pihole_binary.stat.exists

- name: Download Pi-hole installer
  ansible.builtin.get_url:
    url: https://install.pi-hole.net
    dest: /tmp/pihole_install.sh
    mode: "0755"
  when: not pihole_binary.stat.exists

- name: Install Pi-hole unattended
  ansible.builtin.command:
    cmd: bash /tmp/pihole_install.sh --unattended
    creates: /usr/local/bin/pihole
  when: not pihole_binary.stat.exists
  changed_when: true
